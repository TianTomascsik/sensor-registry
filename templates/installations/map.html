{% extends "base.html" %}
{% load static %}

{% block title %}Karte – {{ app_name }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'vendor/leaflet/leaflet.css' %}">
<link rel="stylesheet" href="{% static 'vendor/leaflet/MarkerCluster.css' %}">
<link rel="stylesheet" href="{% static 'vendor/leaflet/MarkerCluster.Default.css' %}">
<style>
  #map { height: calc(100vh - 12rem); min-height: 360px; border-radius: 0.5rem; }
  .map-popup img { width: 100%; max-width: 200px; border-radius: 0.375rem; margin-bottom: 0.5rem; }
</style>
{% endblock %}

{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2">
  <h1 class="h3 mb-0">Karte</h1>
  <div class="d-flex gap-2">
    <a href="{% url 'installations:search' %}" class="btn btn-outline-primary">
      <i class="bi bi-search me-1"></i>Suche
    </a>
    <a href="{% url 'installations:list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-list me-1"></i>Liste
    </a>
  </div>
</div>

<div id="mapStatus" class="text-muted mb-2">Installationen werden geladen …</div>
<div id="map"
     data-url="{% url 'api:installation_map' %}"
     data-detail-url="{% url 'installations:detail' 0 %}"
     data-tile-url="{{ map_tile_url }}"
     data-tile-attribution="{{ map_tile_attribution }}"
     data-tile-max-zoom="{{ map_tile_max_zoom }}"
     data-marker-icon="{% static 'vendor/leaflet/images/marker-icon.png' %}"
     data-marker-icon-2x="{% static 'vendor/leaflet/images/marker-icon-2x.png' %}"
     data-marker-shadow="{% static 'vendor/leaflet/images/marker-shadow.png' %}"></div>
{% endblock %}

{% block scripts %}
<script src="{% static 'vendor/leaflet/leaflet.js' %}"></script>
<script src="{% static 'vendor/leaflet/leaflet.markercluster.js' %}"></script>
<script type="module" src="{% static 'js/map.js' %}"></script>
{% endblock %}
