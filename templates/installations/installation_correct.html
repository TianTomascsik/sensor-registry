{% extends "base.html" %}

{% block title %}Installation korrigieren – {{ app_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="d-flex align-items-center mb-3">
      <a href="{% url 'installations:detail' installation.pk %}" class="btn btn-link px-0 me-2">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h1 class="h3 mb-0">Installation korrigieren</h1>
    </div>
    <p class="text-muted">Sensor <code>{{ installation.sensor.dev_eui }}</code> (unveränderlich)</p>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" novalidate>
          {% csrf_token %}
          {% include "includes/_form_fields.html" %}
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
              <i class="bi bi-check-lg me-1"></i>Speichern
            </button>
            <a href="{% url 'installations:detail' installation.pk %}" class="btn btn-outline-secondary btn-lg">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
