{% extends "base.html" %}

{% block title %}Einladung ungültig – {{ app_name }}{% endblock %}
{% block chrome %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4 mt-md-5">
  <div class="col-12 col-sm-10 col-md-7 col-lg-5">
    <div class="text-center">
      <i class="bi bi-exclamation-triangle display-5 text-warning"></i>
      <h1 class="h4 mt-3">Einladung ungültig</h1>
      <p class="text-muted">{{ reason }}</p>
      <p class="text-muted small">
        Bitte wenden Sie sich an Ihren Administrator, um eine neue Einladung zu erhalten.
      </p>
    </div>
  </div>
</div>
{% endblock %}
