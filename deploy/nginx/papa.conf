# Nginx-Reverse-Proxy für die Sensor-Dokumentation (Betrieb OHNE Docker).
#
# Ablage: /etc/nginx/sites-available/papa  → per Symlink nach sites-enabled aktivieren.
# Passe server_name, die Zertifikatspfade und die Verzeichnisse (/srv/papa) an.
# TLS-Zertifikate werden typischerweise mit Certbot/Let's Encrypt erzeugt (siehe DEPLOY.md).

upstream papa_app {
    server 127.0.0.1:8000;
}

# HTTP: ACME-Challenge zulassen, sonst auf HTTPS umleiten.
server {
    listen 80;
    listen [::]:80;
    server_name app.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name app.example.com;

    # --- TLS (Pfade nach Certbot-Ausstellung anpassen) ---
    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Maximale Upload-Größe (auf DATA_UPLOAD_MAX_MEMORY_SIZE = 15 MB abgestimmt, mit Reserve).
    client_max_body_size 20m;

    # Kompression textbasierter Antworten.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml
               application/gpx+xml application/vnd.google-earth.kml+xml;
    gzip_min_length 1024;

    # --- Statische Dateien (von Django per collectstatic gesammelt) ---
    location /static/ {
        alias /srv/papa/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # --- Geschützte Medien: NICHT öffentlich erreichbar ---
    # Django prüft die Berechtigung und setzt X-Accel-Redirect auf diese interne Location.
    location /_protected_media/ {
        internal;
        alias /srv/papa/media/;
    }

    # --- Anwendung ---
    location / {
        proxy_pass http://papa_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
