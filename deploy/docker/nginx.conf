# Nginx-Konfiguration für das Docker-Compose-Setup (Reverse Proxy vor dem App-Container).
# TLS wird hier der Einfachheit halber nicht terminiert; für Produktion entweder Zertifikate
# einbinden oder einen vorgelagerten TLS-Proxy verwenden (siehe DEPLOY.md).

upstream papa_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml
               application/gpx+xml application/vnd.google-earth.kml+xml;
    gzip_min_length 1024;

    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Geschützte Medien: nur intern, wird von Django per X-Accel-Redirect angesteuert.
    location /_protected_media/ {
        internal;
        alias /srv/media/;
    }

    location / {
        proxy_pass http://papa_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
