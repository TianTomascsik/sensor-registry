# Produktions-Setup mit Docker Compose (optional – die Anwendung läuft auch ohne Docker).
#
# Start aus dem Projektwurzelverzeichnis:
#   docker compose -f deploy/docker/docker-compose.prod.yml up -d --build
#
# Benötigt eine .env im Projektwurzelverzeichnis mit mindestens DJANGO_SECRET_KEY und
# DJANGO_ALLOWED_HOSTS. Die datenbank- und Docker-spezifischen Werte werden hier gesetzt.
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-papa}
      POSTGRES_USER: ${POSTGRES_USER:-papa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papa}
    volumes:
      - papa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-papa} -d ${POSTGRES_DB:-papa}"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      DJANGO_ENV: prod
      GUNICORN_BIND: 0.0.0.0:8000
      DATABASE_URL: postgres://${POSTGRES_USER:-papa}:${POSTGRES_PASSWORD:-papa}@db:5432/${POSTGRES_DB:-papa}
      # HTTP-only-Setup: keine SSL-Weiterleitung erzwingen (siehe DEPLOY.md für TLS).
      DJANGO_SECURE_SSL: ${DJANGO_SECURE_SSL:-0}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      MEDIA_SERVE_BACKEND: accel
    volumes:
      - papa_media:/app/media
      - papa_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - papa_static:/srv/static:ro
      - papa_media:/srv/media:ro
    depends_on:
      - app

volumes:
  papa_pgdata:
  papa_media:
  papa_static:
